<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="6" fill="#FAF0E6"/>
  <defs>
    <mask id="fm">
      <rect width="32" height="32" fill="white"/>
      <circle cx="10" cy="16" r="4.5" fill="black"/>
    </mask>
  </defs>
  <!-- Faisceaux asymétriques — point à gauche, rayonnement fort vers la droite -->
  <g mask="url(#fm)">
    <!-- Gauche : courts, reçoit peu -->
    <line x1="10" y1="16" x2="0"  y2="16" stroke="#C4673A" stroke-width="2"   stroke-linecap="round"/>
    <line x1="10" y1="16" x2="0"  y2="11" stroke="#C4673A" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
    <line x1="10" y1="16" x2="0"  y2="21" stroke="#C4673A" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
    <line x1="10" y1="16" x2="2"  y2="7"  stroke="#C4673A" stroke-width="0.8" stroke-linecap="round" opacity="0.28"/>
    <line x1="10" y1="16" x2="2"  y2="25" stroke="#C4673A" stroke-width="0.8" stroke-linecap="round" opacity="0.28"/>
    <!-- Droite : longs, donne beaucoup -->
    <line x1="10" y1="16" x2="32" y2="16" stroke="#C4673A" stroke-width="2"   stroke-linecap="round"/>
    <line x1="10" y1="16" x2="32" y2="9"  stroke="#C4673A" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
    <line x1="10" y1="16" x2="32" y2="23" stroke="#C4673A" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
    <line x1="10" y1="16" x2="32" y2="3"  stroke="#C4673A" stroke-width="1"   stroke-linecap="round" opacity="0.38"/>
    <line x1="10" y1="16" x2="32" y2="29" stroke="#C4673A" stroke-width="1"   stroke-linecap="round" opacity="0.38"/>
    <line x1="10" y1="16" x2="30" y2="0"  stroke="#C4673A" stroke-width="0.7" stroke-linecap="round" opacity="0.18"/>
    <line x1="10" y1="16" x2="30" y2="32" stroke="#C4673A" stroke-width="0.7" stroke-linecap="round" opacity="0.18"/>
  </g>
  <!-- Point source -->
  <circle cx="10" cy="16" r="3.5" fill="#C4673A"/>
</svg>
